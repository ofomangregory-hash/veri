[build]
builder = "NIXPACKS"
buildCommand = "npx pnpm install --no-frozen-lockfile && BASE_PATH=/ npx pnpm --filter @workspace/z-fantasy run build && npx pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production npx pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300

[[services]]
name = "z-fantasy"
