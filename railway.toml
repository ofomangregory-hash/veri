[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@10.26.1 --force && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/z-fantasy run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production pnpm --filter @workspace/api-server run start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300

[[services]]
name = "z-fantasy"
