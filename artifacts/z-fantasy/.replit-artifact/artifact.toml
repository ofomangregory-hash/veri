kind = "web"
previewPath = "/"
title = "Z-Fantasy"
version = "1.0.0"
id = "artifacts/z-fantasy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/z-fantasy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/z-fantasy", "run", "build" ]
publicDir = "artifacts/z-fantasy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
